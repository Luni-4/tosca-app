{% extends "layout" %}
{% block page %}
<section class="section is-max-desktop is-fullheight">
    <div class="container has-text-centered">
        <h1 class="title is-1 has-text-danger">{{ description }}</h1>
        {% if info %}
        <h2 class="subtitle is-2 has-text-warning mt-6">
            {{ info }}
        </h2>
        {% endif %}
        <a class="button has-background-success-55 is-responsive is-large is-size-5-mobile mt-5" href={{ index }}>
            {{ goto_message }}
        </a>
    </div>
</section>
{% endblock %}
