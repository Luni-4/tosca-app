{% extends "layout" %}
{% block page %}
<section class="unique-section hero">
    <div class="container">
        <h1 class="error-title">{{ description }}</h1>
        {% if info %}
        <h2 class="error-subtitle">{{ info }}</h2>
        {% endif %}
        <a class="button button-primary button-medium-large" href="{{ index }}">{{ goto_message }}</a>
    </div>
</section>
{% endblock %}
