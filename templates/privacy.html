{% extends "layout" %}

{% block page %}
   <section class="unique-section">
        <div class="container">
            <div class="cards-grid">
                <div class="card">
                    <div class="card-header">
                        <button class="info-button open-privacy-modal" aria-label="Info">
                            <svg width="800px" height="800px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
                                <path d="M12 17V11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                <circle cx="1" cy="1" r="1" transform="matrix(1 0 0 -1 11 9)" fill="currentColor"/>
                            </svg>
                        </button>
                    </div>
                    <div class="card-content">
                        <h3>{{ hazards_card.title }}</h3>
                        <div class="button-vertical-container">
                            {% for category in hazards_card.categories %}
                            {% set category_id = category.id | lower %}
                            <button class="button button-medium-vertical hazard-{{ category_id }} hazard-{{ category_id }}-border button-toggle">{{ category.name }}</button>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="modal-overlay" id="privacy-modal-0">
        <div class="modal">
            <div class="content">
                <h2>{{ hazards_card.description_title }}</h2>
                <p>{{  hazards_card.description }}</p>
            </div>
        </div>
    </div>

    <script type="module">
        /* === Modals === */
        function openModal(modal) {
            modal.style.display = 'flex';
            // Prevent background scrolling
            document.body.classList.add('modal-open');
        }

        function closeModal(modal) {
            modal.style.display = 'none';
            document.body.classList.remove('modal-open');
        }

        const openDevicesModal = document.querySelectorAll('.open-privacy-modal');
        openDevicesModal.forEach((openDeviceModal, deviceIndex) => {
            const deviceModal = document.getElementById(`privacy-modal-${deviceIndex}`);

            openDeviceModal.addEventListener('click', () => {
                openModal(deviceModal);
            });

            deviceModal.addEventListener('click', (e) => {
                if (e.target === deviceModal) {
                    closeModal(deviceModal);
                }
            });
        });

        const buttonsToggle = document.querySelectorAll('.button-toggle');
        buttonsToggle.forEach(buttonToggle => {
            buttonToggle.addEventListener('click', () => {
                // TODO: Add the eventSource to tell the webapp that the category is disabled.
                buttonToggle.classList.toggle('button-disabled');
            });
        });
    </script>
{% endblock %}
